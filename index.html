<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Block Studio PRO</title>

<style>
body{margin:0;display:flex;height:100vh;font-family:Arial;}

#sidebar{
  width:280px;
  background:#222;
  color:white;
  padding:10px;
  overflow-y:auto;
}

#workspace{
  flex:1;
  padding:20px;
  background:#f4f4f4;
}

.category{margin-bottom:15px;background:#333;padding:8px;}
.blockButton{display:block;width:100%;margin-bottom:5px;padding:6px;border:none;color:white;cursor:pointer;}
.outputGroup{margin-bottom:15px;}
.outputGroup h3{margin:0;}
.outputBlock{background:white;padding:8px;margin:5px 0;border-left:6px solid black;}

input, select, button{width:100%;margin-bottom:6px;padding:6px;}
.smallBtn{background:red;color:white;border:none;cursor:pointer;padding:2px 6px;margin-left:5px;}
</style>
</head>
<body>

<div id="sidebar">

<h3>Kategorie</h3>
<input id="catName" placeholder="Name">
<input id="catColor" placeholder="Farbe">
<button onclick="addCategory()">Add</button>

<hr>

<h3>Block</h3>
<input id="blockText" placeholder="Text">
<select id="categorySelect"></select>
<button onclick="addBlock()">Add Block</button>

<hr>

<h3>💾 Daten</h3>
<button onclick="exportData()">Export</button>
<button onclick="importData()">Import</button>

<hr>

<h3>🕓 Versionen</h3>
<input id="versionName" placeholder="Version Name">
<button onclick="saveVersion()">Speichern</button>
<select id="versionList"></select>
<button onclick="loadVersion()">Laden</button>

<hr>

<div id="categories"></div>

</div>

<div id="workspace">
<h2>Workspace</h2>
<div id="output"></div>
<button onclick="clearWorkspace()">Clear</button>
</div>

<script>
let categories = JSON.parse(localStorage.getItem("cats")) || [];
let versions = JSON.parse(localStorage.getItem("versions")) || {};

function save(){
  localStorage.setItem("cats", JSON.stringify(categories));
  localStorage.setItem("versions", JSON.stringify(versions));
}

function renderCategories(){
  const c = document.getElementById("categories");
  c.innerHTML="";
  
  categories.forEach((cat,i)=>{
    let div=document.createElement("div");
    div.className="category";
    
    let title=document.createElement("h3");
    title.textContent=cat.name;
    div.appendChild(title);

    cat.blocks.forEach((b,j)=>{
      let btn=document.createElement("button");
      btn.className="blockButton";
      btn.style.background=cat.color;
      btn.textContent=b;
      btn.onclick=()=>addToWorkspace(b,cat);
      div.appendChild(btn);
    });

    c.appendChild(div);
  });

  updateSelect();
  updateVersions();
}

function updateSelect(){
  let s=document.getElementById("categorySelect");
  s.innerHTML="";
  categories.forEach((cat,i)=>{
    let o=document.createElement("option");
    o.value=i;
    o.textContent=cat.name;
    s.appendChild(o);
  });
}

function addCategory(){
  let name=catName.value;
  let color=catColor.value||"blue";
  if(!name) return;

  categories.push({name,color,blocks:[]});
  save();
  renderCategories();
}

function addBlock(){
  let text=blockText.value;
  let i=categorySelect.value;
  if(!text) return;

  categories[i].blocks.push(text);
  save();
  renderCategories();
}

function addToWorkspace(text,cat){
  let container=document.getElementById("output");

  // Gruppe finden oder erstellen
  let group=document.querySelector(`[data-cat="${cat.name}"]`);
  if(!group){
    group=document.createElement("div");
    group.className="outputGroup";
    group.dataset.cat=cat.name;

    let title=document.createElement("h3");
    title.textContent=cat.name;
    group.appendChild(title);

    container.appendChild(group);
  }

  let div=document.createElement("div");
  div.className="outputBlock";
  div.style.borderColor=cat.color;
  div.textContent=text;

  group.appendChild(div);
}

function clearWorkspace(){
  document.getElementById("output").innerHTML="";
}

function exportData(){
  let data=JSON.stringify({categories,versions});
  let blob=new Blob([data],{type:"application/json"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="blockstudio.json";
  a.click();
}

function importData(){
  let input=document.createElement("input");
  input.type="file";

  input.onchange=e=>{
    let file=e.target.files[0];
    let reader=new FileReader();
    reader.onload=()=>{
      let data=JSON.parse(reader.result);
      categories=data.categories||[];
      versions=data.versions||{};
      save();
      renderCategories();
    };
    reader.readAsText(file);
  };

  input.click();
}

function saveVersion(){
  let name=versionName.value;
  if(!name) return;

  versions[name]=JSON.stringify(categories);
  save();
  renderCategories();
}

function loadVersion(){
  let name=versionList.value;
  if(!versions[name]) return;

  categories=JSON.parse(versions[name]);
  save();
  renderCategories();
}

function updateVersions(){
  let list=document.getElementById("versionList");
  list.innerHTML="";
  Object.keys(versions).forEach(v=>{
    let o=document.createElement("option");
    o.value=v;
    o.textContent=v;
    list.appendChild(o);
  });
}

renderCategories();
</script>

</body>
</html>
</html>
