<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Block Studio FINAL++</title>

<style>
body{margin:0;display:flex;height:100vh;font-family:Arial;}

#sidebar{
  width:280px;
  background:#222;
  color:white;
  padding:10px;
  overflow-y:auto;
}

#workspace{
  flex:1;
  padding:20px;
  background:#f4f4f4;
}

.category{margin-bottom:15px;background:#333;padding:8px;}

.categoryHeader{
  display:flex;
  justify-content:space-between;
}

.blockButton{
  display:flex;
  justify-content:space-between;
  width:100%;
  margin-bottom:5px;
  padding:6px;
  border:none;
  color:white;
  cursor:pointer;
}

.smallBtn{
  background:red;
  color:white;
  border:none;
  cursor:pointer;
  padding:2px 6px;
  margin-left:4px;
}

.editBtn{
  background:orange;
}

.outputGroup{margin-bottom:15px;}

.outputBlock{
  background:white;
  padding:8px;
  margin:5px 0;
  border-left:6px solid black;
}

input, select, button{width:100%;margin-bottom:6px;padding:6px;}
</style>
</head>
<body>

<div id="sidebar">

<h3>Kategorie</h3>
<input id="catName" placeholder="Name">
<input id="catColor" placeholder="Farbe">
<button onclick="addCategory()">Add</button>

<hr>

<h3>Block</h3>
<input id="blockText" placeholder="Text">
<select id="categorySelect"></select>
<button onclick="addBlock()">Add Block</button>

<hr>

<div id="categories"></div>

</div>

<div id="workspace">
<h2>Workspace</h2>
<div id="output"></div>
</div>

<script>
let categories = JSON.parse(localStorage.getItem("cats")) || [];

function save(){
  localStorage.setItem("cats", JSON.stringify(categories));
}

function renderCategories(){
  const c=document.getElementById("categories");
  c.innerHTML="";

  categories.forEach((cat,i)=>{
    let div=document.createElement("div");
    div.className="category";

    let header=document.createElement("div");
    header.className="categoryHeader";

    let title=document.createElement("strong");
    title.textContent=cat.name;

    let editCat=document.createElement("button");
    editCat.textContent="✏️";
    editCat.className="smallBtn editBtn";
    editCat.onclick=()=>{
      let newName=prompt("Neuer Name:", cat.name);
      let newColor=prompt("Neue Farbe:", cat.color);
      if(newName) categories[i].name=newName;
      if(newColor) categories[i].color=newColor;
      save();
      renderCategories();
    };

    let delCat=document.createElement("button");
    delCat.textContent="X";
    delCat.className="smallBtn";
    delCat.onclick=()=>{
      if(confirm("Kategorie löschen?")){
        categories.splice(i,1);
        save();
        renderCategories();
      }
    };

    header.appendChild(title);
    header.appendChild(editCat);
    header.appendChild(delCat);
    div.appendChild(header);

    cat.blocks.forEach((b,j)=>{
      let row=document.createElement("div");
      row.className="blockButton";
      row.style.background=cat.color;

      let text=document.createElement("span");

      // ✂️ TEXT KÜRZEN + HOVER
      text.textContent = b.length > 33 ? b.substring(0,33) + "..." : b;
      text.title = b;

      text.style.flex=1;
      text.onclick=()=>addToWorkspace(b,cat);

      let edit=document.createElement("button");
      edit.textContent="✏️";
      edit.className="smallBtn editBtn";
      edit.onclick=()=>{
        let newText=prompt("Neuer Text:", b);
        if(newText){
          categories[i].blocks[j]=newText;
          save();
          renderCategories();
        }
      };

      let del=document.createElement("button");
      del.textContent="X";
      del.className="smallBtn";
      del.onclick=()=>{
        categories[i].blocks.splice(j,1);
        save();
        renderCategories();
      };

      row.appendChild(text);
      row.appendChild(edit);
      row.appendChild(del);

      div.appendChild(row);
    });

    c.appendChild(div);
  });

  updateSelect();
}

function updateSelect(){
  let s=document.getElementById("categorySelect");
  s.innerHTML="";
  categories.forEach((cat,i)=>{
    let o=document.createElement("option");
    o.value=i;
    o.textContent=cat.name;
    s.appendChild(o);
  });
}

function addCategory(){
  let name=catName.value;
  let color=catColor.value||"blue";
  if(!name) return;

  categories.push({name,color,blocks:[]});
  save();
  renderCategories();
}

function addBlock(){
  let text=blockText.value;
  let i=categorySelect.value;
  if(!text) return;

  categories[i].blocks.push(text);
  save();
  renderCategories();
}

function addToWorkspace(text,cat){
  let container=document.getElementById("output");

  let group=document.querySelector(`[data-cat="${cat.name}"]`);

  if(!group){
    group=document.createElement("div");
    group.className="outputGroup";
    group.dataset.cat=cat.name;

    let title=document.createElement("h3");
    title.textContent=cat.name;

    group.appendChild(title);
    container.appendChild(group);
  }

  let div=document.createElement("div");
  div.className="outputBlock";
  div.style.borderColor=cat.color;
  div.textContent=text;

  group.appendChild(div);
}

renderCategories();
</script>

</body>
</html>
